<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon">⏱</span>
      <h1 class="brand-name">FocusTrack</h1>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    @if (errorMessage()) {
      <div class="alert alert--error" role="alert">{{ errorMessage() }}</div>
    }

    <form class="auth-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email" class="form-label">Email address</label>
        <input
          id="email"
          type="email"
          name="email"
          class="form-input"
          placeholder="you@example.com"
          [(ngModel)]="email"
          required
          email
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
        />
      </div>

      <button
        type="submit"
        class="btn btn--primary"
        [disabled]="isLoading() || loginForm.invalid"
      >
        @if (isLoading()) {
          <span class="spinner"></span> Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <div style="margin: 1.5rem 0; display: flex; align-items: center; text-align: center; color: var(--color-text-muted);">
      <div style="flex: 1; border-top: 1px solid var(--color-border);"></div>
      <span style="padding: 0 10px; font-size: 0.85rem;">OR</span>
      <div style="flex: 1; border-top: 1px solid var(--color-border);"></div>
    </div>

    <!-- Redirects directly to the backend challenge endpoint -->
    <a href="http://localhost:5028/api/auth/google-login" 
       style="display: flex; align-items: center; justify-content: center; width: 100%; padding: 0.75rem; background-color: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); border-radius: 0.5rem; text-decoration: none; font-weight: 500; transition: background 0.2s;">
      <svg style="width: 20px; height: 20px; margin-right: 10px;" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </a>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register" class="auth-link">Create one</a>
    </p>
  </div>
</div>
