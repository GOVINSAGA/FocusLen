<div class="p-8">
  <div class="auth-card" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h1 class="auth-title">Welcome to FocusTrack!</h1>
    <p class="auth-subtitle mb-8">You have successfully logged in.</p>
    
    <div class="alert alert--success mb-8">
      Your session JWT has been stored and successfully validated.
    </div>

    <button class="btn btn--primary" (click)="logout()">
      Sign Out
    </button>
  </div>
</div>
